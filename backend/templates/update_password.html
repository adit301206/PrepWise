<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Password - PrepWise</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Raleway:wght@700;800&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

    <!-- Custom CSS (Reusing Login CSS for consistency) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body class="glass-theme">
    <div class="login-wrapper">
        <div class="glass-card">
            <div class="text-start mb-4">
                <h1 class="login-title text-center">Reset Password</h1>
                <p class="text-muted mb-0 text-center">Enter your new password below.</p>
            </div>

            <form id="updatePasswordForm" onsubmit="event.preventDefault(); handleUpdatePassword();">
                <div class="mb-3">
                    <label for="newPassword" class="form-label fw-bold">New Password</label>
                    <div class="position-relative">
                        <input type="password" class="glass-input" id="newPassword" placeholder="••••••••" required />
                        <i class="fa-solid fa-eye password-toggle-icon"
                            onclick="togglePasswordVisibility('newPassword')"></i>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-bold">Confirm Password</label>
                    <div class="position-relative">
                        <input type="password" class="glass-input" id="confirmPassword" placeholder="••••••••"
                            required />
                    </div>
                </div>

                <button type="submit" class="btn-login mb-3" id="updateBtn">Update Password</button>
            </form>

            <div class="text-center">
                <a href="{{ url_for('login') }}" class="small text-muted">Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Password Visibility Toggle
        function togglePasswordVisibility(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        async function handleUpdatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const updateBtn = document.getElementById('updateBtn');

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            if (newPassword.length < 6) {
                alert("Password must be at least 6 characters.");
                return;
            }

            // Extract tokens from URL hash
            // Supabase redirects to: /update-password#access_token=...&refresh_token=...&type=recovery
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const type = params.get('type');

            if (!accessToken) {
                alert("Invalid or expired link. Please request a new password reset.");
                return;
            }

            const originalText = updateBtn.innerText;
            updateBtn.innerText = "Updating...";
            updateBtn.disabled = true;

            try {
                const response = await fetch('/api/update-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        new_password: newPassword,
                        access_token: accessToken,
                        refresh_token: refreshToken
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("Password updated successfully! Redirecting to login...");
                    window.location.href = "{{ url_for('login') }}";
                } else {
                    alert("Update Failed: " + (result.error || "Unknown error"));
                }

            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while updating password.");
            } finally {
                updateBtn.innerText = originalText;
                updateBtn.disabled = false;
            }
        }
    </script>
</body>

</html>

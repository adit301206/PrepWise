<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result | PrepWise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/result.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container px-3 px-md-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/PrepWise-Logo.png') }}" width="40" height="40"
                    class="rounded-circle">
                <span class="fw-bold" style="color: #4c1d95;">PrepWise</span>
            </a>
        </div>
    </nav>

    <div class="result-container">
        <div class="glass-card">

            <div class="trophy-container mb-4">
                <i class="fa-solid fa-trophy trophy-icon"></i>
            </div>

            <div class="progress-circle-container mb-4">
                <svg class="progress-ring" width="160" height="160">
                    <circle class="progress-ring__track" stroke="#BFDBFE" stroke-width="12" fill="transparent" r="70"
                        cx="80" cy="80" />
                    <circle class="progress-ring__circle" stroke="url(#gradient)" stroke-width="12" fill="transparent"
                        r="70" cx="80" cy="80" />
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#6366F1" />
                            <stop offset="100%" stop-color="#EC4899" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="score-content">
                    <span class="score-percentage" id="scorePercent">0%</span>
                </div>
            </div>

            <h1 class="result-title">{{ feedback_message }}</h1>
            <p class="result-subtitle mb-4">You answered <strong>{{ score }}</strong> out of <strong>{{ total
                    }}</strong> questions correctly.</p>

            <div class="stats-grid mb-4">
                <div class="stat-pill total">
                    <span class="stat-label">Total</span>
                    <span class="stat-value">{{ total }}</span>
                </div>
                <div class="stat-pill correct">
                    <span class="stat-label">Correct</span>
                    <span class="stat-value">{{ score }}</span>
                </div>
                <div class="stat-pill wrong">
                    <span class="stat-label">Wrong</span>
                    <span class="stat-value">{{ total - score }}</span>
                </div>
            </div>

            <div class="d-flex flex-column gap-3">
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-primary-custom w-100">
                    <i class="fa-solid fa-house me-2"></i> Back to Dashboard
                </a>

                <button class="btn btn-outline-custom w-100"
                    onclick="alert('Detailed review feature is coming effectively in the next update!')">
                    <i class="fa-solid fa-list-check me-2"></i> Review Answers
                </button>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const circle = document.querySelector('.progress-ring__circle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;

            // Set initial state
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = circumference;

            // --- SAFETY FIX: Defaults to 0 if python variable is missing ---
            const targetPercent = Number("{{ score_percent | default(0) }}");

            const offset = circumference - (targetPercent / 100) * circumference;

            // Animate after small delay
            setTimeout(() => {
                circle.style.strokeDashoffset = offset;
            }, 300);

            // Animate Number
            const numberEl = document.getElementById('scorePercent');
            let currentNum = 0;
            // Prevent division by zero if percent is 0
            const stepTime = targetPercent > 0 ? (1500 / targetPercent) : 0;

            if (targetPercent > 0) {
                const timer = setInterval(() => {
                    currentNum++;
                    numberEl.innerText = `${currentNum}%`;
                    if (currentNum >= targetPercent) clearInterval(timer);
                }, stepTime);
            } else {
                numberEl.innerText = "0%";
            }
        });
    </script>
</body>

</html>

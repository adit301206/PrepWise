<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - PrepWise</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Raleway:wght@700;800&display=swap"
    rel="stylesheet" />

  <!-- Font Awesome (optional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body class="glass-theme">
  <!-- Left-aligned, vertically centered -->
  <div class="login-wrapper">
    <div class="glass-card px-3 px-md-4">
      <div class="text-start mb-2">
        <img src="{{ url_for('static', filename='images/PrepWise-Logo.png') }}" alt="PrepWise Logo"
          class="login-logo mb-2 rounded-circle mx-auto d-block" />
        <h1 class="login-title text-center">PrepWise</h1>
        <p class="text-muted mb-0">Login to continue your prep journey</p>
      </div>

      <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
        <div class="mb-2">
          <label for="email" class="form-label fw-bold">Email Address</label>
          <input type="email" class="glass-input" id="email" placeholder="name@example.com" />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label fw-bold">Password</label>
          <div class="position-relative">
            <input type="password" class="glass-input" id="password" placeholder="••••••••" />
            <i class="fa-solid fa-eye password-toggle-icon"></i>
          </div>
        </div>

        <button type="submit" class="btn-login mb-3">Login</button>


        <div class="d-flex justify-content-center align-items-center ">
          <!-- <div class="form-check"> -->
          <!-- <input class="form-check-input" type="checkbox" id="remember"/> -->
          <!-- <label class="form-check-label text-muted" for="remember">Remember me</label> -->
          <!-- </div> -->
          <a href="#" class="small" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
        </div>

        <hr class="my-2" />

        <div class="text-start">
          <span class="text-muted">New here? </span>
          <a href="{{ url_for('signup') }}" class="fw-bold" style="text-decoration: none;">Create an account</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Login Success -->
  <div class="modal fade" id="loginSuccessModal" tabindex="-1" aria-labelledby="loginSuccessModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <div class="modal-body">
          <div class="mb-3 icon-wrapper">
            <i class="fa-solid fa-circle-check fa-4x"></i>
          </div>
          <h4 class="modal-title fw-bold mb-2">Welcome Back!</h4>
          <p class="text-muted-modal">
            Login successful.<br>
            Redirecting to your dashboard...
          </p>
          <div class="spinner-border spinner-custom mt-2" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Forgot Password -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <div class="modal-header border-0">
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <i class="fa-solid fa-key fa-3x text-info"></i>
          </div>
          <h4 class="modal-title fw-bold mb-2">Forgot Password?</h4>
          <p class="text-muted-modal mb-4">
            Enter your email address and we'll send you a link to reset your password.
          </p>
          <form id="forgotPasswordForm" onsubmit="event.preventDefault(); handleForgotPassword();">
            <div class="mb-3 text-start">
              <label for="resetEmail" class="form-label fw-bold" style="color: #bfdbfe;">Email Address</label>
              <input type="email" class="glass-input" id="resetEmail" placeholder="name@example.com" required />
            </div>
            <button type="submit" class="btn-login w-100" id="resetBtn">Send Reset Link</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* --- Modal Styling with Requested Palette --- */
    /* #bfdbfe (Light Blue)
         #fde68a (Light Yellow)
         #fca5a5 (Light Red/Pink)
         #1e293b (Dark Slate)
         #e9d5ff (Light Purple) 
      */

    .modal-content {
      background-color: #1e293b;
      /* Dark Slate Background */
      border: 2px solid #bfdbfe;
      /* Light Blue Border */
      color: #bfdbfe;
      /* Light Blue Text */
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(191, 219, 254, 0.2);
    }

    .modal-title {
      color: #fde68a;
      /* Light Yellow Title */
    }

    .text-muted-modal {
      color: #e9d5ff !important;
      /* Light Purple Subtext */
    }

    .icon-wrapper {
      color: #fca5a5;
      /* Light Red/Pink Icon */
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .spinner-custom {
      color: #fde68a;
      /* Yellow Spinner */
    }

    .btn-close-white {
      filter: invert(1) grayscale(100%) brightness(200%);
    }

    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/password_toggle.js') }}"></script>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.querySelector('.btn-login');

      if (!email || !password) {
        alert("Please enter email and password.");
        return;
      }

      const originalText = loginBtn.innerText;
      loginBtn.innerText = "Logging in...";
      loginBtn.disabled = true;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (response.ok) {
          // Save session
          localStorage.setItem('access_token', result.session.access_token);
          localStorage.setItem('user', JSON.stringify(result.session.user));

          // Show Modal
          const successModal = new bootstrap.Modal(document.getElementById('loginSuccessModal'));
          successModal.show();

          // Redirect
          setTimeout(() => {
            const role = result.session.user.role;
            if (role === 'teacher') {
              window.location.href = "{{ url_for('teacher_console') }}?user_id=" + result.session.user.id;
            } else {
              window.location.href = "{{ url_for('student_dashboard') }}?user_id=" + result.session.user.id;
            }
          }, 2000);

        } else {
          alert("Login Failed: " + (result.error || "Invalid credentials"));
        }

      } catch (error) {
        console.error("Error:", error);
        alert("An error occurred during login.");
      } finally {
        loginBtn.innerText = originalText;
        loginBtn.disabled = false;
      }
    }

    async function handleForgotPassword() {
      const email = document.getElementById('resetEmail').value;
      const resetBtn = document.getElementById('resetBtn');

      if (!email) {
        alert("Please enter your email.");
        return;
      }

      const originalText = resetBtn.innerText;
      resetBtn.innerText = "Sending...";
      resetBtn.disabled = true;

      try {
        const response = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const result = await response.json();

        if (response.ok) {
          alert("If an account exists for " + email + ", you will receive a password reset link shortly.");
          // Close modal
          const modalEl = document.getElementById('forgotPasswordModal');
          const modal = bootstrap.Modal.getInstance(modalEl);
          modal.hide();
        } else {
          alert("Error: " + (result.error || "Could not send reset link."));
        }
      } catch (error) {
        console.error("Error:", error);
        alert("An error occurred. Please try again.");
      } finally {
        resetBtn.innerText = originalText;
        resetBtn.disabled = false;
      }
    }
  </script>

</html>

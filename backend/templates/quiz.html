<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Session - PrepWise</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Raleway:wght@700;800&family=Anton&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/quiz.css') }}">
</head>

<body>

    <!-- Background Animation -->
    <div class="background-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- PRESERVED NAVBAR (DO NOT TOUCH) -->
    <!-- Navbar (Synced with Student Dashboard) -->
    <nav class="navbar navbar-expand-lg fixed-top py-3 dashboard-navbar">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/PrepWise-Logo.png') }}" alt="PrepWise Logo"
                    class="logo rounded-circle">
                <span class="brand-name">PrepWise</span>
            </a>

            <div class="d-none d-md-block ms-4">
                <span class="student-badge">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Student
                </span>
            </div>

            <div class="profile-badge ms-auto me-3 order-lg-last" title="My Profile">
                <div class="avatar" data-bs-toggle="offcanvas" data-bs-target="#offcanvasProfile" role="button">
                    <span id="navbarUserInitial" class="fw-bold">U</span>
                </div>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="ms-auto d-flex align-items-center gap-3 me-3">
                    <!-- Mobile Sidebar Toggle (Integrated) -->
                    <button class="btn btn-outline-primary d-lg-none w-100 my-2"
                        onclick="document.querySelector('.quiz-sidebar').classList.toggle('show')">
                        <i class="fa-solid fa-list-ol"></i> Q-Palette
                    </button>

                    <a href="{{ url_for('analytics') }}" class="btn btn-analytics">
                        <i class="fa-solid fa-chart-pie me-2"></i>Analytics
                    </a>
                    <button class="btn btn-settings">
                        <i class="fa-solid fa-gear me-2"></i>Settings
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar (Question Palette) -->
    <aside class="quiz-sidebar" id="quizSidebar">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Question Palette</h5>
            <!-- Close btn for mobile -->
            <button class="btn btn-sm btn-icon d-lg-none"
                onclick="document.querySelector('.quiz-sidebar').classList.remove('show')">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>

        <p class="text-muted small">Jump to any question instantly.</p>

        <div id="sidebar-grid" class="question-grid">
            <!-- JS will populate: <div class="q-badge">1</div> -->
        </div>

        <div class="mt-4 small">
            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="q-badge" style="width:15px;height:15px;font-size:10px;"></div> Pending
            </div>
            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="q-badge active" style="width:15px;height:15px;font-size:10px;"></div> Current
            </div>
            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="q-badge solved-correct" style="width:15px;height:15px;font-size:10px;"></div> Correct
            </div>
            <div class="d-flex align-items-center gap-2 mb-2">
                <div class="q-badge solved-incorrect" style="width:15px;height:15px;font-size:10px;"></div> Incorrect
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="q-badge skipped" style="width:15px;height:15px;font-size:10px;"></div> Skipped
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="quiz-content-wrapper mt-5 pt-5">
        <div class="container-fluid" style="max-width: 900px;">

            <div class="glass-card mt-3">
                <!-- Question Number & Difficulty -->
                <div class="d-flex justify-content-between align-items-start mb-4">
                    <div>
                        <span id="question-number" class="question-number">QUESTION 1</span>
                        <div id="difficulty-wrapper">
                            <span id="difficulty-badge">MEDIUM</span>
                        </div>
                    </div>
                </div>

                <!-- Text -->
                <h2 id="question-text" class="question-text">
                    Loading question...
                </h2>

                <!-- Options -->
                <div id="options-container">
                    <!-- JS Injected Tiles -->
                </div>

                <!-- Buttons -->
                <div class="nav-buttons">
                    <button id="btn-prev" class="btn-glass" disabled>
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <button id="btn-action" class="btn-glass btn-action">
                        SKIP & NEXT
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- Finish Confirmation Modal -->
    <div class="modal fade" id="finishQuizModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal p-4 text-center">
                <div class="modal-body">
                    <div class="mb-4">
                        <i class="fa-solid fa-flag-checkered fa-3x text-primary mb-3"></i>
                        <h3 class="fw-bold mb-2">Ready to Submit?</h3>
                        <p class="text-muted">You won't be able to change your answers once you finish the quiz.</p>
                    </div>
                    <div class="d-flex gap-3 justify-content-center">
                        <button type="button" class="btn btn-outline-secondary rounded-pill px-4"
                            data-bs-dismiss="modal">Cancel</button>
                        <button type="button" id="btn-confirm-finish" class="btn btn-primary rounded-pill px-4"
                            style="background: var(--soft-pink); border: none; color: #7f1d1d; font-weight: 700;">Yes,
                            Finish</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Explanation Toast -->
    <div id="explanation-toast" class="explanation-toast">
        <div class="d-flex justify-content-between mb-2">
            <div id="toast-header" class="toast-header"></div>
            <button type="button" class="btn-close btn-sm"
                onclick="document.getElementById('explanation-toast').classList.remove('show')"></button>
        </div>
        <div id="toast-body" class="toast-body"></div>
    </div>

    <!-- Segmented Progress Bar (Footer) -->
    <div id="progress-bar-container" class="segmented-progress-bar"></div>

    <!-- Data Injection -->
    <script id="quiz-data" type="application/json">
        {{ questions | tojson }}
    </script>
    <script id="user-id" type="application/json">
        {{ session.get('user_id') | tojson }}
    </script>

    <!-- Bootstrap & Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                const qData = JSON.parse(document.getElementById('quiz-data').textContent);
                const uId = JSON.parse(document.getElementById('user-id').textContent);
                const tId = (qData && qData.length > 0) ? qData[0].topic_id : null;

                if (!qData || qData.length === 0) {
                    document.getElementById('question-text').innerText = "No questions loaded.";
                    return;
                }

                window.quizManager = new QuizManager(qData, uId, tId);
            } catch (e) {
                console.error("Init Error:", e);
            }
        });
    </script>
</body>

</html>
